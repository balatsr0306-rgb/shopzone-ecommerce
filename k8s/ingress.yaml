# ─────────────────────────────────────────────────────────────────────────────
# ShopZone ALB Ingress
# Uses public subnets in shopzone-vpc:
#   subnet-0660ebda52b33e398  ap-south-1a  10.0.0.0/20
#   subnet-062bc75ee246c2230  ap-south-1b  10.0.16.0/20
#
# Routes:
#   /api  → shopzone-backend:5000
#   /     → shopzone-frontend:80
#
# Apply: kubectl apply -f k8s/ingress.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopzone-ingress
  namespace: shopzone
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Explicitly pin to YOUR public subnets in shopzone-vpc
    alb.ingress.kubernetes.io/subnets: subnet-0660ebda52b33e398,subnet-062bc75ee246c2230
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # HTTP only for now — add certificate-arn below to enable HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # Uncomment after creating ACM certificate:
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: "443"
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:ACCOUNT_ID:certificate/CERT-ID
spec:
  ingressClassName: alb
  rules:
    - host: shopzone.yourdomain.com   # ← change to your domain (or remove for IP access)
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shopzone-backend
                port:
                  number: 5000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: shopzone-backend
                port:
                  number: 5000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: shopzone-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shopzone-frontend
                port:
                  number: 80
