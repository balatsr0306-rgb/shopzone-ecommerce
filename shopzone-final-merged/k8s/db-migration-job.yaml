# ─────────────────────────────────────────────────────────────────────────────
# ShopZone DB Migration Job
# Runs node src/config/migrate.js once to create tables in RDS
# RDS must be in same VPC (vpc-016ee8add8c12b1cf) for private connectivity
# Apply: kubectl apply -f k8s/db-migration-job.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: batch/v1
kind: Job
metadata:
  name: shopzone-db-migration
  namespace: shopzone
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/shopzone-backend:latest   # ← change ACCOUNT_ID
          command: ["node", "src/config/migrate.js"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "YOUR-RDS-ENDPOINT.ap-south-1.rds.amazonaws.com"   # ← change
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "ecommerce"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopzone-db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
