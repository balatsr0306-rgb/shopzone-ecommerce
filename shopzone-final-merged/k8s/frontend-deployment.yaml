# ─────────────────────────────────────────────────────────────────────────────
# ShopZone Frontend — Deployment + Service
# Namespace: shopzone
# Apply: kubectl apply -f k8s/frontend-deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopzone-frontend
  namespace: shopzone
  labels:
    app: shopzone-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopzone-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopzone-frontend
    spec:
      containers:
        - name: frontend
          # ── Replace ACCOUNT_ID with your AWS account ID ───────────────
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/shopzone-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: shopzone-frontend
  namespace: shopzone
  labels:
    app: shopzone-frontend
spec:
  selector:
    app: shopzone-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
