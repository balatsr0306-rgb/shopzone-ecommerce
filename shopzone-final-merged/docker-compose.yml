version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# ShopZone — Local Development Stack
# Includes: PostgreSQL, Backend, Frontend, SonarQube, Prometheus, Grafana
#
# Quick start:
#   docker-compose up -d db backend frontend
#   docker-compose --profile monitoring up -d    (add Prometheus + Grafana)
#   docker-compose --profile security up -d      (add SonarQube)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: shopzone_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ecommerce
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js API) ─────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: shopzone_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:      development
      PORT:          5000
      DB_HOST:       db
      DB_PORT:       5432
      DB_NAME:       ecommerce
      DB_USER:       postgres
      DB_PASSWORD:   postgres123
      JWT_SECRET:    dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL:  http://localhost:3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: shopzone_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ── SonarQube (profile: security) ─────────────────────────────────────────
  sonar-db:
    image: postgres:15-alpine
    container_name: sonar_db
    profiles: [security]
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sonarqube
      POSTGRES_USER:     sonar
      POSTGRES_PASSWORD: sonarpass
    volumes:
      - sonar_pgdata:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    profiles: [security]
    restart: unless-stopped
    depends_on:
      - sonar-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL:      jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonarpass
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ── Prometheus (profile: monitoring) ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: [monitoring]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # ── Grafana (profile: monitoring) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: [monitoring]
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: shopzone2024
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  pgdata:
  sonar_pgdata:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  prometheus_data:
  grafana_data:
